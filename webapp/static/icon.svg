<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="iPodSync">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3038"/>
      <stop offset="1" stop-color="#111419"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fa"/>
      <stop offset="1" stop-color="#cfd5dc"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121620"/>
      <stop offset="1" stop-color="#0a0d13"/>
    </linearGradient>
    <radialGradient id="wheel" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#eef1f4"/>
      <stop offset="1" stop-color="#d3d9e0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- iPod body -->
  <rect x="140" y="60" width="232" height="392" rx="30" fill="url(#body)"
        stroke="#b9c0c9" stroke-width="2"/>

  <!-- screen -->
  <rect x="168" y="86" width="176" height="146" rx="10" fill="url(#screen)"/>
  <!-- music note on screen -->
  <g fill="#3b82f6">
    <rect x="238" y="120" width="10" height="74" rx="4"/>
    <path d="M248 120c22-6 40-10 40-10v20s-18 4-40 10z"/>
    <ellipse cx="230" cy="196" rx="18" ry="13"/>
    <ellipse cx="290" cy="182" rx="16" ry="12"/>
    <rect x="280" y="110" width="10" height="74" rx="4"/>
  </g>

  <!-- click wheel -->
  <circle cx="256" cy="342" r="80" fill="url(#wheel)" stroke="#c2c9d1" stroke-width="2"/>
  <circle cx="256" cy="342" r="27" fill="#f6f8fa" stroke="#c2c9d1" stroke-width="2"/>
  <g fill="#8b939d" font-family="system-ui, sans-serif" font-size="15" font-weight="600" text-anchor="middle">
    <text x="256" y="291">MENU</text>
  </g>
</svg>
